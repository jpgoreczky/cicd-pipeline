name: CI/CD Pipeline for FastAPI

# Trigger the workflow only on push events targeting the main branch
on:
  push:
    branches:
      - main

jobs:
  # Stage 1: Static Code Analysis (Linting)
  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Setup Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Linting Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Execute Flake8 Analysis
        run: |
          # Stop the build if there are critical Python syntax errors
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Treat formatting errors as warnings without failing the build
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # Stage 2: Automated Application Testing
  test:
    name: Automated Testing
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: stockuser
          POSTGRES_PASSWORD: stockpass
          POSTGRES_DB: stockdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Setup Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Application Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Pytest Suite
        run: |
          pytest

  # Stage 3: Container Compilation and Registry Distribution
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Authenticate with Docker Hub Registry
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Docker Buildx Engine
        uses: docker/setup-buildx-action@v2

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-project:latest

  # Stage 4: Remote Infrastructure Deployment
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/ec2-user/app"

      - name: Execute Remote SSH Deployment Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/app

            # Write environment variables to a .env file on the server
            cat > .env << EOF
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            EOF

            # Authenticate with DockerHub
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # Pull latest image
            docker-compose pull app

            # Start or restart services
            docker-compose up -d

            # Run migrations against the live database
            docker-compose exec -T app alembic upgrade head

            # Clean up old images
            docker image prune -f

            echo "Deployment complete."